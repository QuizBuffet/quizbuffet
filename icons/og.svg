<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0d1117"/>
  <rect x="60" y="60" width="1080" height="510" rx="24" fill="#0066cc"/>
  <!-- Grid dots -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1.5" fill="rgba(255,255,255,0.12)"/>
  </pattern>
  <rect x="60" y="60" width="1080" height="510" rx="24" fill="url(#dots)"/>
  <!-- Logo mark -->
  <rect x="88" y="88" width="120" height="120" rx="20" fill="rgba(0,0,0,0.3)"/>
  <text x="148" y="142" font-family="Arial Black, Arial, sans-serif" font-size="52" font-weight="900" text-anchor="middle" fill="#fff">Q</text>
  <text x="148" y="194" font-family="Arial Black, Arial, sans-serif" font-size="28" font-weight="700" text-anchor="middle" fill="rgba(255,255,255,0.7)">B</text>
  <!-- Main heading -->
  <text x="600" y="290" font-family="Arial Black, Arial, sans-serif" font-size="110" font-weight="900" text-anchor="middle" fill="#fff">QuizBuffet</text>
  <!-- Tagline -->
  <text x="600" y="370" font-family="Arial, sans-serif" font-size="36" font-weight="400" text-anchor="middle" fill="rgba(255,255,255,0.85)">Free Cybersecurity Certification Practice</text>
  <!-- Pills -->
  <rect x="226" y="420" width="170" height="44" rx="22" fill="rgba(0,0,0,0.25)"/>
  <text x="311" y="448" font-family="Arial, sans-serif" font-size="20" font-weight="600" text-anchor="middle" fill="#fff">CompTIA</text>
  <rect x="418" y="420" width="120" height="44" rx="22" fill="rgba(0,0,0,0.25)"/>
  <text x="478" y="448" font-family="Arial, sans-serif" font-size="20" font-weight="600" text-anchor="middle" fill="#fff">CISSP</text>
  <rect x="560" y="420" width="100" height="44" rx="22" fill="rgba(0,0,0,0.25)"/>
  <text x="610" y="448" font-family="Arial, sans-serif" font-size="20" font-weight="600" text-anchor="middle" fill="#fff">CEH</text>
  <rect x="682" y="420" width="180" height="44" rx="22" fill="rgba(0,0,0,0.25)"/>
  <text x="772" y="448" font-family="Arial, sans-serif" font-size="20" font-weight="600" text-anchor="middle" fill="#fff">+ many more</text>
  <!-- Bottom URL -->
  <text x="600" y="530" font-family="Arial, sans-serif" font-size="24" font-weight="400" text-anchor="middle" fill="rgba(255,255,255,0.5)">quizbuffet.com</text>
